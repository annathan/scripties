<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Safety Buddy Warning</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body.url-warning {
      background: #fff8e1;
    }
    body.financial-warning {
      background: #fce4ec;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .emoji {
      font-size: 96px;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      color: #b71c1c;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .reason {
      font-size: 20px;
      color: #333;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .dest {
      font-size: 14px;
      color: #777;
      word-break: break-all;
      margin-bottom: 28px;
    }
    .financial-message {
      font-size: 18px;
      color: #4a0000;
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      line-height: 1.6;
      text-align: left;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 14px;
    }
    .btn-primary:hover { background: #1b5e20; }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      color: #888;
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #f5f5f5; color: #333; }
    .notice {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script src="utils.js"></script>
  <script src="warning.js"></script>
</body>
</html>
