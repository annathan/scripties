<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Safety Buddy Settings</title>
  <style>
    body {
      font-family: sans-serif;
      width: 320px;
      padding: 16px;
      background: #f0f7ff;
      margin: 0;
    }
    h1 {
      font-size: 20px;
      color: #1565c0;
      margin: 0 0 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 15px;
      border: 1px solid #bbb;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 14px;
    }
    input:focus {
      outline: none;
      border-color: #1565c0;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #0d47a1;
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #2e7d32;
      font-weight: bold;
      min-height: 20px;
    }
    .hint {
      font-size: 12px;
      color: #777;
      margin-top: -10px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <h1>🛡️ Safety Buddy</h1>
  <p class="subtitle">Fill in the details below so Safety Buddy knows who to contact if something looks risky.</p>

  <label for="userName">Your name</label>
  <input type="text" id="userName" placeholder="e.g. Rose" />

  <label for="guardianName">Family member's name</label>
  <input type="text" id="guardianName" placeholder="e.g. Sarah" />

  <label for="guardianEmail">Family member's email</label>
  <input type="email" id="guardianEmail" placeholder="e.g. sarah@example.com" />

  <label for="guardianPhone">Family member's phone (for urgent alerts)</label>
  <input type="tel" id="guardianPhone" placeholder="e.g. +1 555 123 4567" />
  <p class="hint">Include country code. Used only for gift card / money transfer warnings.</p>

  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
