# Input helpers used across presence automations.
# Drop this file in your packages/ directory and add to configuration.yaml:
#   homeassistant:
#     packages: !include_dir_named packages

input_boolean:
  # Flip these to pause all arrival automations (e.g. during a party when
  # people will be coming and going and you don't want the door auto-unlocking).
  arrival_automations_enabled:
    name: Arrival automations enabled
    initial: true
    icon: mdi:home-automation

  # Per-person away flags — set ON when person leaves, OFF when they arrive.
  # Used to prevent the garage/door triggering if a person never actually left
  # (e.g. HA restarts while they're home and zone re-evaluates on startup).
  alice_was_away:
    name: Alice was away
    initial: false
    icon: mdi:account-arrow-left

  bob_was_away:
    name: Bob was away
    initial: false
    icon: mdi:account-arrow-left

  # Solar surplus automations master switch
  solar_surplus_automations_enabled:
    name: Solar surplus automations enabled
    initial: true
    icon: mdi:solar-power

input_number:
  # How long (minutes) the front door stays unlocked after an arrival trigger
  # before auto-relocking. Adjustable from the dashboard.
  front_door_auto_relock_delay:
    name: Front door auto-relock delay
    min: 1
    max: 15
    step: 1
    initial: 3
    unit_of_measurement: min
    icon: mdi:lock-clock

  # Solar surplus thresholds (W) — adjustable from dashboard without code edits
  solar_threshold_hot_water:
    name: Solar surplus threshold — hot water boost
    min: 500
    max: 3000
    step: 100
    initial: 1000
    unit_of_measurement: W
    icon: mdi:water-boiler

  solar_threshold_pool_pump:
    name: Solar surplus threshold — pool pump high speed
    min: 1000
    max: 5000
    step: 100
    initial: 2000
    unit_of_measurement: W
    icon: mdi:pool

  solar_threshold_ev:
    name: Solar surplus threshold — EV charging
    min: 1500
    max: 5000
    step: 100
    initial: 3000
    unit_of_measurement: W
    icon: mdi:ev-station
