use_default_settings: true

server:
  # Generate a value with: openssl rand -hex 32
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  infinite_scroll: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en-GB"
  formats:
    - html
    - json   # required for Open WebUI integration

# Keep a focused set of reliable engines
engines:
  - name: google
    engine: google
    disabled: false
    weight: 2

  - name: bing
    engine: bing
    disabled: false
    weight: 1

  - name: duckduckgo
    engine: duckduckgo
    disabled: false
    weight: 1

  - name: wikipedia
    engine: wikipedia
    disabled: false
    weight: 2

  - name: google scholar
    engine: google_scholar
    disabled: false
    weight: 2
    categories: science
